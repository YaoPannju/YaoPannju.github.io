# ==================== 基本设置 ====================
mainSections   = ["post"]
rssFullContent = true

# ==================== 页脚 ====================
[footer]
    since      = 2026
    customText = ""

# ==================== 日期格式 ====================
[dateFormat]
    published   = "2006-01-02"
    lastUpdated = "2006-01-02"

# ==================== 侧边栏 ====================
[sidebar]
    compact = false
    emoji   = ""
    avatar  = "/img/avatar.jpg"

# ==================== 文章设置 ====================
[article]
    headingAnchor = false
    math          = false
    toc           = true
    readingTime   = true

    [article.license]
        enabled = false
        default = "Licensed under CC BY-NC-SA 4.0"

# ==================== 小组件 ====================
[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 10 } },
    ]
    page     = [{ type = "toc" }]

# ==================== 暗色模式 ====================
[colorScheme]
    toggle  = true
    default = "auto"

# ==================== 评论系统（默认关闭） ====================
[comments]
    enabled  = false
    provider = "disqus"

# ==================== 图片处理 ====================
[imageProcessing]
    [imageProcessing.content]
        enabled = true
        widths  = [800, 1600, 2400]
    [imageProcessing.thumbnail]
        enabled = true

# ==================== Open Graph ====================
[opengraph.twitter]
    site = ""
    card = "summary_large_image"
